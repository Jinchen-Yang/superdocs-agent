<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/app/assets/support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: 'Plus Jakarta Sans', 'Noto Sans SC', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
  textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(140,140,170,.32); border-radius: 99px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes blobDrift { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(40px,-30px) scale(1.12); } 66% { transform: translate(-30px,24px) scale(.94); } }
  @keyframes msgIn { from { opacity: 0; transform: translateY(14px) scale(.98); } to { opacity: 1; transform: none; } }
  @keyframes dotPulse { 0%,80%,100% { opacity:.25; transform: translateY(0); } 40% { opacity:1; transform: translateY(-3px); } }
  @keyframes caretBlink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
  @keyframes shimmer { from { background-position: -180% 0; } to { background-position: 180% 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes glowPulse { 0%,100% { opacity:.55; } 50% { opacity:1; } }
  @keyframes riseIn { from { opacity:0; transform: translateY(18px); } to { opacity:1; transform:none; } }
  @keyframes cardIn { from { opacity:0; transform: translateY(20px) scale(.94); } to { opacity:1; transform:none; } }
  @keyframes popIn { 0% { opacity:0; transform: scale(.4) rotate(-40deg); } 60% { transform: scale(1.12) rotate(6deg); } 100% { opacity:1; transform: scale(1) rotate(0); } }
  @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes markGlow { 0%,100% { box-shadow: 0 8px 30px rgba(0,0,0,.12), 0 0 0 0 var(--gc); } 50% { box-shadow: 0 14px 40px rgba(0,0,0,.14), 0 0 34px 4px var(--gc); } }
  @keyframes avatarBreath { 0%,100% { box-shadow: 0 4px 12px var(--gc); } 50% { box-shadow: 0 4px 12px var(--gc), 0 0 0 6px var(--gr); } }
  @keyframes sheenMove { 0% { transform: translateX(-130%) skewX(-18deg); } 100% { transform: translateX(230%) skewX(-18deg); } }
  @keyframes expandIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform:none; } }
  @keyframes sendReadyPulse { 0%,100% { box-shadow: 0 4px 14px var(--gc); } 50% { box-shadow: 0 4px 20px var(--gc), 0 0 0 5px var(--gr); } }
</style>
</helmet>

<div style="{{ s.root }}">
  <div style="{{ s.blobA }}"></div>
  <div style="{{ s.blobB }}"></div>
  <div style="{{ s.blobC }}"></div>

  <div style="{{ s.shell }}">

    <!-- SIDEBAR -->
    <aside style="{{ s.sidebar }}">
      <div style="{{ s.brandRow }}">
        <div style="{{ s.brandMark }}">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 6.8L21 11l-6.6 2.2L12 20l-2.4-6.8L3 11l6.6-2.2z" fill="white"/></svg>
        </div>
        <sc-if value="{{ showLabels }}" hint-placeholder-val="{{ true }}"><span style="{{ s.brandName }}">superdocs</span></sc-if>
      </div>

      <button style="{{ s.newBtn }}" onClick="{{ newChat }}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="{{ accent }}" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <sc-if value="{{ showLabels }}" hint-placeholder-val="{{ true }}"><span style="{{ s.newBtnTxt }}">新对话 New chat</span></sc-if>
      </button>

      <sc-if value="{{ showLabels }}" hint-placeholder-val="{{ true }}">
        <div style="{{ s.searchBox }}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="{{ s.subStroke }}" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
          <span style="{{ s.searchTxt }}">搜索对话…</span>
        </div>
      </sc-if>

      <div style="{{ s.convScroll }}">
        <sc-if value="{{ showLabels }}" hint-placeholder-val="{{ true }}"><div style="{{ s.groupLabel }}">今天 Today</div></sc-if>
        <sc-for list="{{ convToday }}" as="c" hint-placeholder-count="3">
          <button style="{{ c.style }}" style-hover="{{ c.hover }}" onClick="{{ c.onClick }}">
            <span style="{{ c.dot }}">{{ c.initial }}</span>
            <sc-if value="{{ showLabels }}" hint-placeholder-val="{{ true }}"><span style="{{ c.txt }}">{{ c.title }}</span></sc-if>
          </button>
        </sc-for>
        <sc-if value="{{ showLabels }}" hint-placeholder-val="{{ true }}"><div style="{{ s.groupLabel }}">过去 7 天</div></sc-if>
        <sc-for list="{{ convPast }}" as="c" hint-placeholder-count="3">
          <button style="{{ c.style }}" style-hover="{{ c.hover }}" onClick="{{ c.onClick }}">
            <span style="{{ c.dot }}">{{ c.initial }}</span>
            <sc-if value="{{ showLabels }}" hint-placeholder-val="{{ true }}"><span style="{{ c.txt }}">{{ c.title }}</span></sc-if>
          </button>
        </sc-for>
      </div>

      <div style="{{ s.userRow }}">
        <div style="{{ s.userAvatar }}">维</div>
        <sc-if value="{{ showLabels }}" hint-placeholder-val="{{ true }}">
          <div style="{{ s.userMeta }}">
            <div style="{{ s.userName }}">维克多 Wei</div>
            <div style="{{ s.userPlan }}">Plus · 升级</div>
          </div>
        </sc-if>
      </div>
    </aside>

    <!-- MAIN -->
    <main style="{{ s.main }}">
      <header style="{{ s.topbar }}">
        <button style="{{ s.modelPill }}" onClick="{{ cycleModel }}" title="点击切换模型">
          <span style="{{ s.modelDot }}"></span>
          <span style="{{ s.modelName }}">{{ modelLabel }}</span>
          <span style="{{ s.modelSub }}">{{ modelProvider }}</span>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="{{ s.subStroke }}" stroke-width="2.2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>

        <div style="{{ s.topRight }}">
          <div style="{{ s.seg }}">
            <sc-for list="{{ segs }}" as="g" hint-placeholder-count="3">
              <button style="{{ g.style }}" onClick="{{ g.onClick }}">{{ g.label }}</button>
            </sc-for>
          </div>
          <button style="{{ s.iconBtn }}" style-hover="{{ s.iconBtnHover }}" onClick="{{ toggleTheme }}">
            <sc-if value="{{ isDark }}" hint-placeholder-val="{{ true }}">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="{{ s.iconStroke }}" stroke-width="2" stroke-linecap="round" style="{{ s.themeIcon }}"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
            </sc-if>
            <sc-if value="{{ isLight }}" hint-placeholder-val="{{ true }}">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="{{ s.iconStroke }}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="{{ s.themeIcon }}"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
            </sc-if>
          </button>
        </div>
      </header>

      <div style="{{ s.scrollArea }}" ref="{{ setScrollRef }}">
        <div style="{{ s.centerCol }}">

          <!-- WELCOME -->
          <sc-if value="{{ isWelcome }}" hint-placeholder-val="{{ true }}">
            <div style="{{ s.welcomeWrap }}">
              <div style="{{ s.welcomeMark }}">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 6.8L21 11l-6.6 2.2L12 20l-2.4-6.8L3 11l6.6-2.2z" fill="url(#wg)"/><defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="{{ accent }}"/><stop offset="1" stop-color="{{ accent2 }}"/></linearGradient></defs></svg>
              </div>
              <h1 style="{{ s.greeting }}">{{ greeting }}</h1>
              <p style="{{ s.subtitle }}">我是 superdocs 助手，帮你检索北邮的教材、试题、复习资料。试试下面的示例，或直接开始。</p>
              <div style="{{ s.cardGrid }}">
                <sc-for list="{{ cards }}" as="c" hint-placeholder-count="4">
                  <button style="{{ c.style }}" style-hover="{{ c.hover }}" onMouseMove="{{ spotMove }}" onMouseEnter="{{ spotEnter }}" onMouseLeave="{{ spotLeave }}" onClick="{{ c.onClick }}">
                    <div style="{{ c.spot }}"></div>
                    <div style="{{ c.iconWrap }}">{{ c.icon }}</div>
                    <div style="{{ c.tcol }}">
                      <div style="{{ c.titleStyle }}">{{ c.title }}</div>
                      <div style="{{ c.subStyle }}">{{ c.sub }}</div>
                    </div>
                  </button>
                </sc-for>
              </div>
            </div>
          </sc-if>

          <!-- MESSAGES -->
          <sc-if value="{{ isChat }}" hint-placeholder-val="{{ true }}">
            <div style="{{ s.msgList }}">
              <sc-for list="{{ messages }}" as="m" hint-placeholder-count="2">
                <div style="{{ m.rowStyle }}">
                  <sc-if value="{{ m.isAssistant }}" hint-placeholder-val="{{ true }}">
                    <div style="{{ m.avatar }}">
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 6.8L21 11l-6.6 2.2L12 20l-2.4-6.8L3 11l6.6-2.2z" fill="white"/></svg>
                    </div>
                  </sc-if>
                  <div style="{{ m.col }}">

                    <sc-if value="{{ m.showThinking }}" hint-placeholder-val="{{ true }}">
                      <div style="{{ m.thinkCard }}">
                        <button style="{{ m.thinkHead }}" onClick="{{ m.toggleThinking }}">
                          <sc-if value="{{ m.thinkBusy }}" hint-placeholder-val="{{ true }}">
                            <span style="{{ m.spinner }}"></span>
                          </sc-if>
                          <sc-if value="{{ m.thinkIdle }}" hint-placeholder-val="{{ true }}">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="{{ m.thinkStroke }}" stroke-width="2" stroke-linecap="round"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.6.6 1 1.2 1 2h6c0-.8.4-1.4 1-2A6 6 0 0 0 12 3z"/></svg>
                          </sc-if>
                          <span style="{{ m.thinkLabel }}">{{ m.thinkTitle }}</span>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="{{ m.thinkStroke }}" stroke-width="2.2" stroke-linecap="round" style="{{ m.chevron }}"><path d="M6 9l6 6 6-6"/></svg>
                        </button>
                        <sc-if value="{{ m.thinkingOpen }}" hint-placeholder-val="{{ true }}">
                          <div style="{{ m.thinkBody }}">{{ m.thinkText }}</div>
                        </sc-if>
                      </div>
                    </sc-if>

                    <sc-if value="{{ m.showTool }}" hint-placeholder-val="{{ true }}">
                      <div style="{{ m.toolCard }}">
                        <div style="{{ m.toolIcon }}">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                        </div>
                        <span style="{{ m.toolLabel }}">{{ m.toolText }}</span>
                        <span style="{{ m.toolStatusStyle }}">{{ m.toolStatusText }}</span>
                        <sc-if value="{{ m.toolRunning }}" hint-placeholder-val="{{ true }}"><span style="{{ m.toolBar }}"></span></sc-if>
                      </div>
                    </sc-if>

                    <sc-if value="{{ m.showBubble }}" hint-placeholder-val="{{ true }}">
                      <div style="{{ m.bubble }}">
                        <sc-if value="{{ m.showDots }}" hint-placeholder-val="{{ true }}">
                          <span style="{{ m.dots }}"><span style="{{ m.d1 }}"></span><span style="{{ m.d2 }}"></span><span style="{{ m.d3 }}"></span></span>
                        </sc-if>
                        <span style="{{ m.textStyle }}">{{ m.content }}</span>
                        <sc-if value="{{ m.caret }}" hint-placeholder-val="{{ true }}"><span style="{{ m.caretStyle }}">▋</span></sc-if>
                      </div>
                    </sc-if>

                  </div>
                </div>
              </sc-for>
            </div>
          </sc-if>

        </div>
      </div>

      <!-- COMPOSER -->
      <div style="{{ s.composerWrap }}">
        <div style="{{ s.composer }}">
          <button style="{{ s.attachBtn }}">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="{{ s.iconStroke }}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.4 11.05l-8.5 8.5a5 5 0 0 1-7.07-7.07l8.49-8.49a3.33 3.33 0 0 1 4.71 4.71l-8.49 8.49a1.67 1.67 0 0 1-2.36-2.36l7.78-7.78"/></svg>
          </button>
          <textarea style="{{ s.textarea }}" placeholder="给 superdocs 发送消息…" value="{{ input }}" onChange="{{ onInput }}" onKeyDown="{{ onKey }}" onFocus="{{ onFocusInput }}" onBlur="{{ onBlurInput }}" rows="1"></textarea>
          <button style="{{ s.sendBtn }}" style-hover="{{ s.sendBtnHover }}" style-active="{{ s.sendBtnActive }}" onClick="{{ send }}">
            <sc-if value="{{ generating }}" hint-placeholder-val="{{ true }}">
              <span style="{{ s.stopGlyph }}"></span>
            </sc-if>
            <sc-if value="{{ idle }}" hint-placeholder-val="{{ true }}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </sc-if>
          </button>
        </div>
        <div style="{{ s.disclaimer }}">superdocs 可能出错，资料请以原站为准。</div>
      </div>
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;defaultVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;liquid&quot;,&quot;crystal&quot;,&quot;aurora&quot;],&quot;default&quot;:&quot;crystal&quot;,&quot;tsType&quot;:&quot;'liquid'|'crystal'|'aurora'&quot;},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;'light'|'dark'&quot;}}">
class Component extends DCLogic {
  state = { theme: null, variant: null, view: 'welcome', messages: [], input: '', generating: false, active: null, focused: false, models: [], model: 'deepseek-chat' };

  componentDidMount() {
    this._thread = 't-' + (window.crypto && crypto.randomUUID ? crypto.randomUUID() : Date.now());
    fetch('/app/models').then(r => r.json()).then(d => {
      const models = (d && d.models) || [];
      this.setState({ models, model: (models[0] && models[0].id) || 'deepseek-chat' });
    }).catch(() => {});
  }
  cycleModel = () => {
    const ms = this.state.models; if (!ms.length) return;
    const i = ms.findIndex(m => m.id === this.state.model);
    this.setState({ model: ms[(i + 1) % ms.length].id });
  };
  curModel() { return this.state.models.find(m => m.id === this.state.model) || { label: 'DeepSeek V3', provider: 'deepseek' }; }

  // ---- static data ----
  CANNED = {
    quantum: {
      thinking: ['理解核心：量子纠缠 ≠ 经典关联', '寻找贴近生活的类比（一对骰子）', '组织：先现象，再本质，最后澄清误区'],
      tool: null,
      content: '量子纠缠就像一对"心灵感应的骰子"——无论相隔多远，测量其中一个的瞬间，另一个的结果也随之确定。\n\n但它们并非事先约定好，而是共享同一个量子态。需要注意：这并不能用来超光速传递信息，因为结果本身是随机的。'
    },
    email: {
      thinking: ['确定受众：产品的早期用户', '搭建结构：问候 → 亮点 → 行动号召', '控制语气：真诚、克制、不浮夸'],
      tool: null,
      content: '主题：我们上线了 ✨\n\n嗨 {名字}，\n\n感谢你一路的陪伴。今天新版本正式发布：更快的响应、全新的界面，以及你呼声最高的「实时协作」。\n\n现在登录即可体验，期待听到你的真实反馈。\n\n— 产品团队'
    },
    fitness: {
      thinking: ['前提：新手 / 居家 / 无器械', '按部位分配，预留恢复日', '强度循序渐进，避免受伤'],
      tool: null,
      content: '居家新手一周计划：\n\n周一　全身激活（深蹲 · 俯卧撑 · 平板支撑 ×3）\n周二　快走或跳绳 20 分钟\n周三　休息 / 拉伸\n周四　下肢（箭步蹲 · 臀桥 · 靠墙静蹲）\n周五　上肢 + 核心\n周末　一天有氧，一天彻底休息。\n\n关键：动作标准 > 数量。'
    },
    compare: {
      thinking: ['明确维度：性能 · 并发 · 学习曲线 · 生态', '检索社区最新观点与基准', '给出场景化的选型建议'],
      tool: { label: '检索资料', done: '已分析 12 篇资料' },
      content: 'Rust：极致性能与内存安全，零成本抽象，适合系统级、对可靠性要求高的场景，但学习曲线较陡。\n\nGo：上手快、并发模型简洁（goroutine）、编译部署轻量，适合云原生与微服务。\n\n建议：追求性能与安全选 Rust；追求开发效率与团队协作选 Go。'
    },
    travel: {
      thinking: ['了解约束：周末两天 · 周边出行', '平衡节奏：一天自然，一天人文', '预留弹性时间'],
      tool: { label: '查询路线', done: '已规划 2 条路线' },
      content: '周末两日提案：\n\nDay 1　近郊徒步 + 湖边野餐，傍晚返程看日落。\nDay 2　老城区漫步、博物馆，午后咖啡馆收尾。\n\n建议错峰出行，周日下午留出缓冲，避免疲惫返工。'
    },
    perf: {
      thinking: ['定位瓶颈：渲染 or 数据 or 网络', '从「测量」而非「猜测」入手', '列出高性价比优化项'],
      tool: { label: '检索资料', done: '已检索相关资料' },
      content: 'React 性能优化优先级：\n\n1　先用 Profiler 定位真正的瓶颈，别凭感觉。\n2　memo / useMemo / useCallback 减少无谓重渲染。\n3　列表用虚拟化（react-window）。\n4　拆分代码、懒加载路由。\n\n记住：先测量，再优化。'
    },
    default: {
      thinking: ['理解问题的真实意图', '检索并组织相关信息', '形成简洁、可执行的回答'],
      tool: { label: '检索资料', done: '已检索相关资料' },
      content: '好的，我来帮你处理这个问题。基于现有信息，我整理了几个关键要点，并给出一个可执行的建议。如果你能补充更多背景，我可以把方案进一步细化。'
    }
  };

  CARDS = [
    { title: '高等数学期末试题', sub: '历年真题 + 答案', prompt: '帮我找高等数学的期末试题', icon: 'spark', c: '#8a5cff' },
    { title: '数据结构复习资料', sub: '课件 / 题库 / 笔记', prompt: '数据结构有哪些复习资料', icon: 'code', c: '#3b82f6' },
    { title: '线性代数教材推荐', sub: '适合自学', prompt: '推荐一本适合自学的线性代数教材', icon: 'pulse', c: '#19c39c' },
    { title: '通信原理历年卷', sub: '按学期筛选', prompt: '通信原理的历年试卷有哪些', icon: 'mail', c: '#ff6b9d' }
  ];

  CONVS = { today: [], past: [] };

  THEMES = {
    light: { text: '#1d1d2b', sub: '#6b6b85', faint: '#9a9ab2', rootBg: 'linear-gradient(135deg,#e4e9ff 0%,#efe6ff 48%,#ffe9f1 100%)', glassRGB: '255,255,255', borderA: 0.6, hi: 0.7, blobs: ['#ffd0a6', '#a6c6ff', '#ecc0ff'], shadow: '0 12px 44px rgba(70,50,130,.14)', segBg: 'rgba(255,255,255,.45)' },
    dark: { text: '#edefff', sub: '#a7a9c9', faint: '#71739a', rootBg: 'linear-gradient(135deg,#090b1b 0%,#130f2e 52%,#0c0a1d 100%)', glassRGB: '32,34,60', borderA: 0.14, hi: 0.12, blobs: ['#5a2da0', '#2d50a0', '#a02d72'], shadow: '0 16px 52px rgba(0,0,0,.55)', segBg: 'rgba(255,255,255,.06)' }
  };

  CFGS = {
    liquid: { label: 'Liquid', blur: 30, sat: 185, alphaL: 0.55, alphaD: 0.5, radius: 22, accent: '#5b6cff', accent2: '#8a5cff', gap: 0, rail: false, centered: false, mainPanel: false, ease: 'cubic-bezier(.22,1,.36,1)' },
    crystal: { label: 'Crystal', blur: 15, sat: 145, alphaL: 0.3, alphaD: 0.26, radius: 28, accent: '#0ea5b8', accent2: '#34d3a8', gap: 14, rail: false, centered: false, mainPanel: true, ease: 'cubic-bezier(.34,1.56,.64,1)' },
    aurora: { label: 'Aurora', blur: 30, sat: 200, alphaL: 0.4, alphaD: 0.38, radius: 26, accent: '#b14dff', accent2: '#ff5ea8', gap: 12, rail: true, centered: true, mainPanel: true, ease: 'cubic-bezier(.22,1,.36,1)' }
  };

  // ---- helpers ----
  theme() { return this.state.theme || this.props.defaultTheme || 'light'; }
  variant() { return this.state.variant || this.props.defaultVariant || 'liquid'; }
  timers = [];
  later(fn, ms) { const id = setTimeout(fn, ms); this.timers.push(id); return id; }
  clearTimers() { this.timers.forEach(clearTimeout); this.timers = []; }
  componentWillUnmount() { this.clearTimers(); }
  componentDidUpdate() { if (this._scroll) this._scroll.scrollTop = this._scroll.scrollHeight; }

  setScrollRef = (el) => { this._scroll = el; };

  glass(t, v, dAlpha, radius) {
    const light = this.theme() === 'light';
    const al = (light ? v.alphaL : v.alphaD) + (dAlpha || 0);
    const edge = light ? '0 0 0 1px rgba(90,80,140,.07)' : '0 0 0 1px rgba(0,0,0,.2)';
    return {
      background: `rgba(${t.glassRGB},${al})`,
      backdropFilter: `blur(${v.blur}px) saturate(${v.sat}%)`,
      WebkitBackdropFilter: `blur(${v.blur}px) saturate(${v.sat}%)`,
      border: `1px solid rgba(255,255,255,${t.borderA})`,
      borderRadius: (radius == null ? v.radius : radius) + 'px',
      boxShadow: `inset 0 1px 0 rgba(255,255,255,${t.hi}), ${edge}, ${t.shadow}`
    };
  }

  frost(t, v, al, radius) {
    const light = this.theme() === 'light';
    const edge = light ? '0 0 0 1px rgba(90,80,140,.07)' : '0 0 0 1px rgba(0,0,0,.2)';
    return {
      background: light ? `rgba(255,255,255,${al})` : `rgba(${t.glassRGB},${al})`,
      border: `1px solid rgba(255,255,255,${t.borderA})`,
      borderRadius: (radius == null ? v.radius : radius) + 'px',
      boxShadow: `inset 0 1px 0 rgba(255,255,255,${t.hi}), ${edge}, ${t.shadow}`
    };
  }

  // ---- actions ----
  newChat = () => { this.clearTimers(); this.setState({ view: 'welcome', messages: [], generating: false, active: null }); };
  toggleTheme = () => this.setState({ theme: this.theme() === 'light' ? 'dark' : 'light' });
  setVariant = (v) => this.setState({ variant: v });
  onInput = (e) => this.setState({ input: e.target.value });
  onKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.send(); } };
  spotMove = (e) => { const el = e.currentTarget; const r = el.getBoundingClientRect(); el.style.setProperty('--mx', (e.clientX - r.left) + 'px'); el.style.setProperty('--my', (e.clientY - r.top) + 'px'); };
  spotEnter = (e) => { const d = e.currentTarget.firstElementChild; if (d) d.style.opacity = '1'; };
  spotLeave = (e) => { const d = e.currentTarget.firstElementChild; if (d) d.style.opacity = '0'; };

  pickKey(text) {
    const s = text.toLowerCase();
    if (s.includes('量子') || s.includes('quantum')) return 'quantum';
    if (s.includes('邮件') || s.includes('mail') || s.includes('email')) return 'email';
    if (s.includes('健身') || s.includes('fitness') || (s.includes('计划') && s.includes('健'))) return 'fitness';
    if (s.includes('rust') || s.includes('go') || s.includes('对比')) return 'compare';
    if (s.includes('旅') || s.includes('travel')) return 'travel';
    if (s.includes('react') || s.includes('性能') || s.includes('perf')) return 'perf';
    return 'default';
  }

  send = (preset) => {
    const text = (preset != null ? preset : this.state.input).trim();
    if (!text || this.state.generating) return;
    const userMsg = { role: 'user', text };
    const aMsg = { role: 'assistant', text: '', searching: true, done: false };
    this.setState({ view: 'chat', input: '', generating: true, active: null, messages: [...this.state.messages, userMsg, aMsg] });
    this.streamReply(text);
  };

  async streamReply(text) {
    try {
      const res = await fetch('/app/chat', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: text }], model: this.state.model, thread: this._thread, resource: 'web' })
      });
      if (!res.ok || !res.body) throw new Error('HTTP ' + res.status);
      const reader = res.body.getReader(); const dec = new TextDecoder(); let acc = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        acc += dec.decode(value, { stream: true });
        this.updateLast({ text: acc, searching: false });
      }
      if (!acc.trim()) this.updateLast({ text: '（无回复，请检查模型配置）' });
      this.updateLast({ done: true });
    } catch (e) {
      this.updateLast({ text: '出错：' + (e && e.message || e), searching: false, done: true });
    }
    this.setState({ generating: false });
  }

  updateLast(patch) {
    this.setState(st => {
      const msgs = st.messages.slice();
      const i = msgs.length - 1;
      msgs[i] = { ...msgs[i], ...patch };
      return { messages: msgs };
    });
  }

  runThinking(canned, shown) {
    if (shown < canned.thinking.length) {
      this.later(() => { this.updateLast({ thinkingShown: shown + 1 }); this.runThinking(canned, shown + 1); }, 460);
    } else {
      this.later(() => this.runTool(canned), 420);
    }
  }
  runTool(canned) {
    if (!canned.tool) { this.startContent(canned); return; }
    this.updateLast({ toolStatus: 'running' });
    this.later(() => {
      this.updateLast({ toolStatus: 'done' });
      this.later(() => this.startContent(canned), 420);
    }, 1150);
  }
  startContent(canned) {
    this.updateLast({ thinkingOpen: false, phase: 'content' });
    const full = canned.content;
    const step = (i) => {
      const next = Math.min(full.length, i + 2);
      this.updateLast({ contentShown: next });
      if (next < full.length) this.later(() => step(next), 16);
      else { this.updateLast({ done: true }); this.setState({ generating: false }); }
    };
    this.later(() => step(0), 60);
  }

  loadConv(group, idx) {
    this.clearTimers();
    const c = this.CONVS[group][idx];
    const canned = this.CANNED[c.key];
    const aMsg = { role: 'assistant', canned, thinkingShown: canned.thinking.length, thinkingOpen: false, toolStatus: canned.tool ? 'done' : null, contentShown: canned.content.length, phase: 'content', done: true };
    this.setState({ view: 'chat', generating: false, active: group + '-' + idx, messages: [{ role: 'user', text: c.user }, aMsg] });
  }

    const h = new Date().getHours();
    if (h < 6) return '夜深了，还在忙吗？';
    if (h < 12) return '早上好，今天想做点什么？';
    if (h < 18) return '下午好，有什么可以帮你？';
    return '晚上好，有什么可以帮你？';
  }

    };
    return e('svg', { width: 20, height: 20, viewBox: '0 0 24 24', fill: 'none' }, paths[name]);
  }

        thinkLabel: { flex: 1, textAlign: 'left' },
        chevron: { transform: m.thinkingOpen ? 'rotate(180deg)' : 'none', transition: 'transform .25s' },
        thinkBody: { padding: '2px 14px 12px', fontSize: '12.5px', lineHeight: 1.7, color: t.sub, whiteSpace: 'pre-wrap', borderTop: `1px solid rgba(${isLight ? '120,120,160' : '255,255,255'},.08)`, paddingTop: '10px', margin: '0 0', animation: 'expandIn .3s ' + v.ease + ' both' },
        // tool
        showTool, toolRunning: running,
        toolCard: { display: 'flex', alignItems: 'center', gap: '10px', position: 'relative', ...F(isLight ? 0.5 : 0.34, 14), padding: '10px 13px', overflow: 'hidden', animation: 'expandIn .35s ' + v.ease + ' both' },
        toolIcon: { width: '26px', height: '26px', flex: '0 0 26px', borderRadius: '8px', display: 'grid', placeItems: 'center', background: accentGrad },
        toolLabel: { fontSize: '12.5px', fontWeight: 700, color: t.text },
        toolText: '检索资料',
        toolStatusStyle: { fontSize: '12px', fontWeight: 600, marginLeft: 'auto', color: running ? v.accent : t.faint },
        toolStatusText: '检索中…',
        toolBar: { position: 'absolute', left: 0, bottom: 0, height: '2px', width: '100%', background: `linear-gradient(90deg,transparent,${v.accent},transparent)`, backgroundSize: '180% 100%', animation: 'shimmer 1.1s linear infinite' },
        // bubble
        showBubble: content.length > 0 || showDots,
        showDots, caret,
        content,
        textStyle: { whiteSpace: 'pre-wrap' },
        bubble: { padding: content.length || showDots ? '13px 17px' : '0', borderRadius: '6px 20px 20px 20px', ...F(isLight ? 0.56 : 0.4, 18), color: t.text, fontSize: '15px', lineHeight: 1.7 },
        dots: { display: 'inline-flex', gap: '4px', alignItems: 'center', padding: '3px 0' },
        d1: { width: '7px', height: '7px', borderRadius: '50%', background: t.sub, animation: 'dotPulse 1.2s ease-in-out 0s infinite' },
        d2: { width: '7px', height: '7px', borderRadius: '50%', background: t.sub, animation: 'dotPulse 1.2s ease-in-out .2s infinite' },
        d3: { width: '7px', height: '7px', borderRadius: '50%', background: t.sub, animation: 'dotPulse 1.2s ease-in-out .4s infinite' },
        caretStyle: { display: 'inline-block', marginLeft: '1px', color: v.accent, animation: 'caretBlink 1s step-end infinite', fontWeight: 400 }
      };
    });

    return {
      s, accent: v.accent, accent2: v.accent2,
      isDark: theme === 'dark', isLight,
      isWelcome: this.state.view === 'welcome', isChat: this.state.view === 'chat',
      showLabels: !v.rail,
      greeting: this.greeting(),
      segs, convToday, convPast, cards, messages,
      input: this.state.input, generating: this.state.generating, idle: !this.state.generating,
      cycleModel: this.cycleModel, modelLabel: this.curModel().label, modelProvider: this.curModel().provider,
      newChat: this.newChat, toggleTheme: this.toggleTheme, send: () => this.send(), onInput: this.onInput, onKey: this.onKey,
      onFocusInput: () => this.setState({ focused: true }), onBlurInput: () => this.setState({ focused: false }),
      spotMove: this.spotMove, spotEnter: this.spotEnter, spotLeave: this.spotLeave,
      setScrollRef: this.setScrollRef
    };
  }
}
</script>
</body>
</html>
