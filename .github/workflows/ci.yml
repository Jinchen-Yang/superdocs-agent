name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # 本仓库 package-lock 解析自 npmmirror（国内源），GitHub runner 在海外，
      # 故显式走官方源用 npm install 重新解析，避免拉包慢/失败。
      - name: Install dependencies
        run: npm install --no-audit --no-fund --registry=https://registry.npmjs.org/
      - name: Typecheck
        run: npm run typecheck
